<section class="md:h-screen py-36 flex items-center relative overflow-hidden zoom-image">
    <div class="absolute inset-0 image-wrap z-1 bg-[url('/assets/images/bg/6.jpg')] bg-no-repeat bg-center bg-cover"></div>
    <div class="absolute inset-0 bg-gradient-to-b from-transparent to-black z-2" id="particles-snow"></div>
    <div class="container relative z-3">
        <div class="flex justify-center">
            <div class="max-w-[400px] w-full m-auto p-6 bg-white dark:bg-slate-900 shadow-md dark:shadow-gray-700 rounded-md">
                <a [routerLink]="'/'"><img [src]="'assets/images/branding/HarmoNest-18.png'" class="mx-auto" alt=""></a>
                <h5 class="my-6 text-xl font-semibold">Login</h5>

                <!-- Error Message -->
                <div *ngIf="error" class="mb-4 p-3 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-md">
                    <div class="flex items-start">
                        <i class="fas fa-exclamation-triangle text-red-500 mt-0.5 mr-2"></i>
                        <div class="flex-1">
                            <p class="text-red-600 dark:text-red-400 text-sm">{{ error }}</p>

                            <!-- Email Confirmation Help -->
                            <div *ngIf="isEmailConfirmationError()" class="mt-3 pt-3 border-t border-red-200 dark:border-red-700">
                                <p class="text-red-600 dark:text-red-400 text-xs mb-2">
                                    <i class="fas fa-info-circle mr-1"></i>
                                    Need to resend the confirmation email?
                                </p>
                                <button
                                    type="button"
                                    (click)="resendConfirmation()"
                                    [disabled]="resendingConfirmation"
                                    class="text-xs bg-red-100 dark:bg-red-800 text-red-700 dark:text-red-300 px-3 py-1 rounded hover:bg-red-200 dark:hover:bg-red-700 transition-colors disabled:opacity-50">
                                    <i class="fas fa-paper-plane mr-1"></i>
                                    <span *ngIf="!resendingConfirmation">Resend Confirmation Email</span>
                                    <span *ngIf="resendingConfirmation">Sending...</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Success Message -->
                <div *ngIf="successMessage" class="mb-4 p-3 bg-green-50 dark:bg-green-900/20 border border-green-200 dark:border-green-800 rounded-md">
                    <div class="flex items-center">
                        <i class="fas fa-check-circle text-green-500 mr-2"></i>
                        <p class="text-green-600 dark:text-green-400 text-sm">{{ successMessage }}</p>
                    </div>
                </div>

                <!-- Success Message for Resend -->
                <div *ngIf="confirmationResent" class="mb-4 p-3 bg-green-50 dark:bg-green-900/20 border border-green-200 dark:border-green-800 rounded-md">
                    <div class="flex items-center">
                        <i class="fas fa-check-circle text-green-500 mr-2"></i>
                        <p class="text-green-600 dark:text-green-400 text-sm">
                            Confirmation email sent! Please check your inbox and spam folder.
                        </p>
                    </div>
                </div>

                <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="text-start">
                    <div class="grid grid-cols-1">
                        <!-- Email Field -->
                        <div class="mb-4">
                            <label class="font-semibold" for="LoginEmail">Email Address:</label>
                            <input
                                id="LoginEmail"
                                type="email"
                                formControlName="email"
                                class="mt-3 w-full py-2 px-3 h-10 bg-transparent dark:bg-slate-900 dark:text-slate-200 rounded outline-none border border-gray-100 dark:border-gray-800 focus:ring-0"
                                [class.border-red-500]="isFieldInvalid('email')"
                                placeholder="name@example.com">
                            <div *ngIf="isFieldInvalid('email')" class="mt-1 text-red-500 text-sm">
                                {{ getFieldError('email') }}
                            </div>
                        </div>

                        <!-- Password Field -->
                        <div class="mb-4">
                            <label class="font-semibold" for="LoginPassword">Password:</label>
                            <div class="relative">
                                <input
                                    id="LoginPassword"
                                    [type]="showPassword ? 'text' : 'password'"
                                    formControlName="password"
                                    class="mt-3 w-full py-2 px-3 h-10 bg-transparent dark:bg-slate-900 dark:text-slate-200 rounded outline-none border border-gray-100 dark:border-gray-800 focus:ring-0 pr-10"
                                    [class.border-red-500]="isFieldInvalid('password')"
                                    placeholder="Password">
                                <button
                                    type="button"
                                    (click)="togglePasswordVisibility()"
                                    class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300">
                                    <i [class]="showPassword ? 'fas fa-eye-slash' : 'fas fa-eye'"></i>
                                </button>
                            </div>
                            <div *ngIf="isFieldInvalid('password')" class="mt-1 text-red-500 text-sm">
                                {{ getFieldError('password') }}
                            </div>
                        </div>

                        <!-- Remember Me & Forgot Password -->
                        <div class="flex justify-between mb-4">
                            <div class="flex items-center mb-0">
                                <input
                                    formControlName="rememberMe"
                                    class="form-checkbox rounded border-gray-100 dark:border-gray-800 text-red-500 focus:border-red-300 focus:ring focus:ring-offset-0 focus:ring-red-500/20 focus:ring-opacity-50 me-2"
                                    type="checkbox"
                                    id="RememberMe">
                                <label class="form-checkbox-label text-slate-400" for="RememberMe">Remember me</label>
                            </div>
                            <p class="text-slate-400 mb-0">
                                <a [routerLink]="'/forgot-password'" class="text-slate-400 hover:text-red-500">Forgot password?</a>
                            </p>
                        </div>

                        <!-- Submit Button -->
                        <div class="mb-4">
                            <button
                                type="submit"
                                [disabled]="loading || loginForm.invalid"
                                class="py-2 px-5 inline-block tracking-wide align-middle duration-500 text-base text-center bg-harmonest-blue hover:bg-harmonest-navy disabled:bg-gray-400 disabled:cursor-not-allowed text-white rounded-md w-full font-corbel">
                                <span *ngIf="loading" class="inline-block animate-spin rounded-full h-4 w-4 border-b-2 border-white mr-2"></span>
                                {{ loading ? 'Signing in...' : 'Login / Sign in' }}
                            </button>
                        </div>

                        <!-- Social Login Buttons -->
                        <div class="mb-4">
                            <div class="relative">
                                <div class="absolute inset-0 flex items-center">
                                    <div class="w-full border-t border-gray-300 dark:border-gray-600"></div>
                                </div>
                                <div class="relative hidden flex justify-center text-sm">
                                    <span class="px-2 bg-white dark:bg-slate-900 text-gray-500">Or continue with</span>
                                </div>
                            </div>

                            <div class="hidden mt-4 grid grid-cols-3 gap-3">
                                <button
                                    type="button"
                                    (click)="signInWithGoogle()"
                                    class="w-full inline-flex justify-center py-2 px-4 border border-gray-300 dark:border-gray-600 rounded-md shadow-sm bg-white dark:bg-slate-800 text-sm font-medium text-gray-500 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-slate-700">
                                    <i class="fab fa-google text-red-500"></i>
                                </button>

                                <button
                                    type="button"
                                    (click)="signInWithFacebook()"
                                    class="w-full inline-flex justify-center py-2 px-4 border border-gray-300 dark:border-gray-600 rounded-md shadow-sm bg-white dark:bg-slate-800 text-sm font-medium text-gray-500 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-slate-700">
                                    <i class="fab fa-facebook text-blue-600"></i>
                                </button>

                                <button
                                    type="button"
                                    (click)="signInWithApple()"
                                    class="w-full inline-flex justify-center py-2 px-4 border border-gray-300 dark:border-gray-600 rounded-md shadow-sm bg-white dark:bg-slate-800 text-sm font-medium text-gray-500 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-slate-700">
                                    <i class="fab fa-apple text-gray-900 dark:text-white"></i>
                                </button>
                            </div>
                        </div>

                        <!-- Sign Up Link -->
                        <div class="text-center hidden">
                            <span class="text-slate-400 me-2">Don't have an account?</span>
                            <a routerLink="/signup" class="text-black dark:text-white font-bold inline-block hover:text-harmonest-blue">Sign Up</a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>
<app-switcher></app-switcher>
<app-back-to-home></app-back-to-home>
